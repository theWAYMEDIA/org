{{ define "main" }}
<section>
    {{ if not (strings.HasPrefix (strings.TrimSpace .Content) "<h1") }}<h1>{{ .Title }}</h1>{{ end }}
    {{ .Content }}
    
    {{ range .Pages.ByParam "book_weight" }}
    <article>
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <p>{{ .Summary }}</p>
    </article>
    {{ end }}
</section>
{{ end }}
